<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建築物測試 - 招牌完整顯示版</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after {
        box-sizing: border-box;
    }

    :root {
        --navy: #1a2a3a;
        --bg: #f4f5f0;
        --white: #ffffff;
    }

    body {
        background: var(--bg);
        color: var(--navy);
        font-family: 'Noto Sans TC', sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        overflow-x: clip;
        overflow-y: visible;
    }

    .art-board {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding-top: 200px; 
        padding-bottom: 100px;
        position: relative;
        width: 100%;
        overflow: visible; 
    }

    .building {
        display: flex;
        align-items: stretch;
        position: relative;
        isolation: isolate;
        overflow: visible;
    }

    /* 屋頂 SVG */
    .roof-svg {
        position: absolute;
        top: -132px;
        left: -3px;
        width: 486px;
        height: 135px;
        z-index: 10;
        overflow: visible;
        pointer-events: none;
    }

    .roof-sign {
        position: absolute;
        top: -178px;
        left: 177px;
        height: 130px;
        display: flex;
        align-items: flex-end;
        z-index: 100;
        pointer-events: none;
    }
    
    .sign-left {
        background: var(--white);
        border: 4px solid var(--navy);
        width: 160px;
        height: 80px;
        transform-origin: bottom right;
        transform: skewY(15deg);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        box-shadow: -5px 5px 0 rgba(0,0,0,0.05);
        /* 移除之前測試用的 margin-top 負值 */
    }
    .sign-left h1 { margin: 0; font-size: 26px; font-weight: 900; letter-spacing: 2px; line-height: 1; color: var(--navy); }
    .sign-left h2 { margin: 0; font-size: 14px; font-weight: 900; letter-spacing: 1px; color: var(--navy); }
    
    .sign-right {
        background: var(--navy);
        color: var(--white);
        border: 4px solid var(--navy);
        border-left: none;
        width: 45px;
        height: 80px;
        transform-origin: bottom left;
        transform: skewY(-15deg);
        display: flex;
        justify-content: center;
        align-items: center;
        writing-mode: vertical-rl;
        font-weight: 900;
        letter-spacing: 2px;
        font-size: 13px;
        text-orientation: upright;
        /* 移除之前測試用的 margin-top 負值 */
    }

    /* 左立面 (正面) */
    .left-face {
        width: 340px;
        background: var(--white);
        border: 3px solid var(--navy);
        transform-origin: top right;
        transform: skewY(15deg);
        display: flex;
        flex-direction: column;
        z-index: 5;
        position: relative;
        overflow: visible;
        box-shadow: 30px 30px 0px rgba(26,42,58,0.05);
    }

    /* 右立面 (側面) */
    .right-face {
        width: 140px;
        background: var(--white);
        border: 3px solid var(--navy);
        border-left: none;
        transform-origin: top left;
        transform: skewY(-15deg);
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px 0;
        z-index: 5;
        overflow: visible;
        box-shadow: 30px 30px 0px rgba(26,42,58,0.05);
    }
    .right-face-bg {
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(to bottom, transparent, transparent 12px, rgba(26,42,58,0.05) 12px, rgba(26,42,58,0.05) 14px);
        clip-path: inset(0); 
    }

    /* 樓層設定 */
    .floor {
        border-bottom: 3px solid var(--navy);
        padding: 25px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: relative;
        flex: 1;
        min-height: 150px;
    }
    .floor:last-child {
        border-bottom: none;
        min-height: 180px;
        padding-bottom: 0;
        align-items: flex-end;
    }

    .floor-num {
        font-weight: 900;
        font-size: 48px;
        color: var(--navy);
        opacity: 0.9;
    }

    .door-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-left: 20px;
    }

    .door {
        width: 130px;
        height: 110px;
        border: 4px solid var(--navy);
        border-bottom: none;
        display: flex;
        background: var(--white);
    }
    .door-panel {
        width: 50%;
        border-right: 2px solid var(--navy);
        display: flex;
        justify-content: center;
        align-items: center;
        writing-mode: vertical-rl;
        font-weight: 900;
        font-size: 16px;
        letter-spacing: 2px;
        text-orientation: upright;
    }
    .door-panel:last-child { border-right: none; }
    .door-handle {
        position: absolute;
        width: 5px; height: 18px;
        background: var(--navy);
        top: 55%;
        border-radius: 2px;
    }
    .handle-left { right: 53%; }
    .handle-right { left: 53%; }

    .text-block { display: flex; flex-direction: column; }
    .fw-900 { font-weight: 900; }
    .text-xl { font-size: 26px; line-height: 1.2; }
    .text-lg { font-size: 20px; }
    .text-sm { font-size: 13px; }
    .text-xs { font-size: 11px; }

    .window {
        border: 3px solid var(--navy);
        padding: 3px;
        display: flex;
        gap: 3px;
        background: var(--white);
    }
    .window-pane {
        border: 1px solid var(--navy);
        flex-grow: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 10px;
        font-weight: bold;
    }

    .deco-tag {
        border: 2px solid var(--navy);
        padding: 2px 8px;
        font-size: 11px;
        font-weight: 900;
        background: var(--navy);
        color: var(--white);
        margin-top: 8px;
        align-self: flex-start;
    }

    .right-content {
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100%;
        justify-content: space-between;
    }
    .vertical-text {
        writing-mode: vertical-rl;
        font-weight: 900;
        font-size: 20px;
        letter-spacing: 5px;
        text-orientation: upright;
    }

    .event-date-badge {
        border: 3px solid var(--navy);
        padding: 10px;
        text-align: center;
        background: var(--white);
        box-shadow: 5px 5px 0 rgba(26,42,58,0.1);
    }
    .date-num { font-size: 30px; font-weight: 900; line-height: 1; }
    .date-label { font-size: 10px; font-weight: 900; margin-top: 5px; border-top: 1px solid var(--navy); padding-top: 2px;}

    @media (max-width: 600px) {
        .art-board { 
            transform: scale(0.6); 
            transform-origin: top center;
            padding-top: 250px;
        }
    }
</style>
</head>
<body>

<div class="art-board">
    <div class="building">
        <!-- 屋頂 SVG -->
        <svg viewBox="0 0 484 133" class="roof-svg">
            <polygon points="2,39.5 142,2 482,93.1 342,130.6" fill="#ffffff" stroke="#1a2a3a" stroke-width="4" stroke-linejoin="round"/>
        </svg>

        <!-- 招牌 -->
        <div class="roof-sign">
            <div class="sign-left">
                <h1>窩的家</h1>
                <h2>WuoHome</h2>
            </div>
            <div class="sign-right">OPEN</div>
        </div>

        <!-- 正面 -->
        <div class="left-face">
            <div class="floor">
                <div class="floor-num">5F</div>
                <div class="text-block" style="align-items:flex-end;text-align:right;">
                    <div class="text-xs fw-900">自媒體內容</div>
                    <div class="fw-900 text-lg">錄播室</div>
                    <div class="window" style="width:100px; height:35px; margin-top:10px;">
                        <div class="window-pane" style="background:var(--navy); color:white;">● ON AIR</div>
                    </div>
                </div>
            </div>

            <div class="floor">
                <div class="text-block">
                    <div class="text-xs fw-900">居住正義</div>
                    <div class="fw-900 text-xl">凌群不動產</div>
                    <div class="text-sm fw-900">社會住宅包租代管</div>
                    <div class="deco-tag">SOCIAL HOUSING</div>
                </div>
                <div class="floor-num">4F</div>
            </div>

            <div class="floor">
                <div class="floor-num">3F</div>
                <div class="text-block" style="align-items:flex-end;text-align:right;">
                    <div class="text-xs fw-900">資源優勢</div>
                    <div class="fw-900 text-xl">優式租售</div>
                    <div class="text-sm fw-900">三重窩的家加盟店</div>
                    <div class="deco-tag">租售一體</div>
                </div>
            </div>

            <div class="floor">
                <div class="text-block">
                    <div class="text-xs fw-900">空間美學</div>
                    <div class="fw-900 text-xl">窩的家室內設計</div>
                    <div class="text-sm fw-900">/ 裝修工程</div>
                    <div class="window" style="width:130px; height:35px; margin-top:10px;">
                        <div class="window-pane">DESIGN</div>
                        <div class="window-pane">STUDIO</div>
                    </div>
                </div>
                <div class="floor-num">2F</div>
            </div>

            <div class="floor">
                <div class="text-block" style="align-self: flex-start; margin-top: 10px;">
                    <div class="floor-num" style="font-size: 56px;">1F</div>
                    <div class="fw-900 text-xl">住商不動產</div>
                    <div class="text-sm fw-900">正義國小店</div>
                </div>
                
                <div class="door-wrapper">
                    <div style="font-weight:900; font-size:20px; border:3px solid var(--navy); padding:2px 8px; margin-bottom: 5px; background: white;">59</div>
                    <div class="door">
                        <div class="door-panel">找資源</div>
                        <div class="door-panel">創開發</div>
                        <div class="door-handle handle-left"></div>
                        <div class="door-handle handle-right"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 側面 -->
        <div class="right-face">
            <div class="right-face-bg"></div>
            <div class="right-content">
                <div class="vertical-text" style="font-size: 14px; letter-spacing: 2px; margin-top: 10px;">SANCHONG DIST.</div>
                <div class="vertical-text">租售裝修全包到家</div>
                <div class="mt-auto" style="margin-bottom:20px; display:flex; flex-direction:column; align-items:center;">
                    <div class="event-date-badge">
                        <div class="date-num">4/26</div>
                        <div class="date-label">GRAND OPEN</div>
                    </div>
                    <div style="font-weight:900; font-size:11px; margin-top:12px;">歡迎蒞臨參觀</div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
